openapi: 3.0.3
info:
  title: Employees work in this enterprise
  description: |-
    A simple directory API that allows 2 operations :
    - get list employees
    - create a new employee
    - read an employee by id
    - update an employee
    - delete an employee
    - search by name
  version: 1.0-SNAPSHOT
servers:
  - url: http://localhost:8080/
tags:
  - name: employee
    description: Employee management

paths:
  /employee:
    get:
      tags:
        - employee
      summary: Get list
      description: Get a list of all employees
      operationId: getEmployees
      parameters:
        - $ref: '#/components/parameters/QueryCurrentPage'
        - $ref: '#/components/parameters/QueryPageSize'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeesResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'

  /employee/{id}:
    get:
      tags:
        - employee
      summary: Get an employee by ID
      operationId: getEmployeeId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        400:
          $ref: '#/components/responses/400'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'

    delete:
      tags:
        - employee
      summary: Delete an employee
      operationId: deleteEmployeeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Employee deleted successfully
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'

  /employee/search/{name}:
    get:
      tags:
        - employee
      summary: Get a list of employees by name
      operationId: getListEmployeeByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
        400:
          $ref: '#/components/responses/400'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'

  /employee/new:
    post:
      tags:
        - employee
      summary: Add employee
      description: Create an employee in the enterprise
      operationId: createEmployee
      requestBody:
        description: name, firstname and service
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        201:
          $ref: '#/components/responses/201'
        400:
          description: Invalid input
        405:
          $ref: '#/components/responses/405'
        500:
          $ref: '#/components/responses/500'

  /employee/edit/{id}:
    put:
      tags:
        - employee
      summary: Update an employee
      operationId: updateEmployeeId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        204:
          description: Employee updated successfully
        404:
          $ref: '#/components/responses/404'
        405:
          $ref: '#/components/responses/405'
        500:
          $ref: '#/components/responses/500'

components:
  ##  Schemas  ##
  schemas:
    Employees:
      type: object
      properties:
        name:
          type: string
        firstname:
          type: string

    EmployeesResponse:
      type: array
      items:
        $ref: '#/components/schemas/Employees'

    EmployeeResponse:
      type: object
      properties:
        name:
          type: string
        firstname:
          type: string
        service:
          type: string
        floor:
          type: integer
          format: int32
        address:
          $ref: '#/components/schemas/Address'

    EmployeeListResponse:
      type: array
      items:
        $ref: "#/components/schemas/EmployeeResponse"

    CreateEmployeeRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        firstname:
          type: string
        service:
          type: string
        floor:
          type: integer
          format: int32
        email:
          type: string
          format: email
          description: The email must be uniq
        address:
          $ref: '#/components/schemas/Address'

    UpdateEmployeeRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        firstname:
          type: string
        service:
          type: string
        floor:
          type: integer
          format: int32

    Address:
      type: object
      properties:
        street:
          type: string
        zipcode:
          type: integer
          format: int32
        city:
          type: string

  ##  Responses  ##
  responses:
    201:
      description: Created
      headers:
        URI:
          description: UIR of the newly created object
          schema:
            type: string
    400:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: "../resources/problem.yaml#/components/schemas/Problem"
    404:
      description: Object not found
      content:
        application/problem+json:
          schema:
            $ref: "../resources/problem.yaml#/components/schemas/Problem"
    405:
      description: Invalid input
      content:
        application/problem+json:
          schema:
            $ref: "../resources/problem.yaml#/components/schemas/InputValidationProblem"
    500:
      description: Unexpect Error
      content:
        application/problem+json:
          schema:
            $ref: "../resources/problem.yaml#/components/schemas/Problem"

  ## Parameters ##
  parameters:
    QueryCurrentPage:
      in: query
      name: currentPage
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
      required: false
      description: "The page to be displayed. Default is 1"

    QueryPageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        format: int32
        minimum: 5
        default: 20
      required: false
      description: "The number of items per page. Default is 20"
