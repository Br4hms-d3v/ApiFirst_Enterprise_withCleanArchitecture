openapi: 3.0.3
info:
  title: problem types
  version: ${project.version}
paths:
  { }
components:
  schemas:
    Problem:
      description: A Problem Detail object (RFC 9457)
      type: object
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type
          default: about:blank
        href:
          type: string
          format: uri
          description: An absolute URI that, when dereferenced, provides human-readable documentation for the problem type (e.g. using HTML)
        title:
          type: string
          description: A short summary of the problem type; Written in English and readable for engineers (usually not suited for non technical stakeholders and not localized),
          example: Service Unavailable
        status:
          type: integer
          format: int32
          description: The Http status code generated by the origin server for this occurrence of the problem
          minimum: 400
          maximum: 600
          exclusiveMaximum: true
          example: 503
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem. it may or may not yield further information if dereferenced
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: "https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types"
        title: Description of the type of problem that occurred
        status: 400
        details: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000

    InvalidParam:
      deprecated: false
      type: object
      properties:
        in:
          description: The location of th invalid parameter (cfr Swagger parameters)
          type: string
          enum:
            - body
            - path
            - query
            - header
        name:
          description: The name of the invalid parameter
          type: string
        value:
          description: The value of the erroneous parameter

    InputValidationProblem:
      type: object
      allOf:
        - $ref: "#/components/schemas/Problem"
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/InputValidationIssue"

    InputValidationIssue:
      type: object
      description: |
        An issue detected during input validation.
        
        `status` is usually not present.
        `href`, if present, refers to documentation of the issue type.
        Additional properties specific to the issue type may be present.
      allOf:
        - $ref: "#/components/schemas/Problem"
      properties:
        in:
          type: string
          description: The location of the invalid input
          enum:
            - body
            - header
            - path
            - query
        name:
          type: string
          description: The name of the invalid input
        value:
          description: The value of the erroneous input