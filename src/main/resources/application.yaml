spring:
  application:
    name: Api_First_Entreprise_With_CleanArchitecture

  datasource:
    url: jdbc:h2:mem:employee;
    username: employee
    password: employee
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console